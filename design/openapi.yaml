openapi: 3.1.0
info:
  title: Multi-Agent AI Platform API
  version: "1.0.0"
  description: >
    Modular Monolith · Hexagonal · Plugin · Event-Driven.
    Auth: Firebase ID Token (local JWT verify). Tenant (workspace_id) derived from identity, never client-supplied.
    Errors: RFC 9457 Problem Details. Pagination: cursor-based. JSON: snake_case.
    All collection endpoints are wrapped as { data: [...], meta: { next_cursor, limit } } (API-04);
    bounded lists set next_cursor: null. Every response returns X-Correlation-Id.
    The interactive WebSocket endpoint /api/v1/ws is out of scope for OpenAPI and is specified in 03-api-spec.md §3.2.
servers:
  - url: /api/v1
security:
  - firebaseBearer: []
tags:
  - name: workspace
  - name: agents
  - name: conversations
  - name: files
  - name: knowledge
  - name: media
  - name: workflows
  - name: credentials
  - name: integrations
  - name: usage
  - name: health

paths:
  /workspace:
    get:
      tags: [workspace]
      operationId: getWorkspace
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WorkspaceOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
    patch:
      tags: [workspace]
      operationId: patchWorkspace
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/WorkspacePatchIn" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WorkspaceOut" } } } }
        default: { $ref: "#/components/responses/Problem" }

  /agents:
    get:
      tags: [agents]
      operationId: listAgents
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/AgentPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /agents/{agent_key}:
    get:
      tags: [agents]
      operationId: getAgent
      parameters: [ { $ref: "#/components/parameters/AgentKey" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AgentOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /agents/{agent_key}/invoke:
    post:
      tags: [agents]
      operationId: invokeAgent
      description: "Run an agent. Set Accept: text/event-stream for SSE streaming, else JSON."
      parameters: [ { $ref: "#/components/parameters/AgentKey" }, { $ref: "#/components/parameters/CorrelationId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AgentInvokeIn" } } } }
      responses:
        "200":
          description: Completion (JSON) or event stream (SSE)
          content:
            application/json: { schema: { $ref: "#/components/schemas/AgentInvokeOut" } }
            text/event-stream: { schema: { type: string, description: "SSE: token|tool_call|final|error events" } }
        default: { $ref: "#/components/responses/Problem" }

  /conversations:
    get:
      tags: [conversations]
      operationId: listConversations
      parameters:
        - { name: agent_key, in: query, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Cursor" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConversationPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [conversations]
      operationId: createConversation
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ConversationCreateIn" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/ConversationOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /conversations/{id}:
    get:
      tags: [conversations]
      operationId: getConversation
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConversationOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      tags: [conversations]
      operationId: deleteConversation
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "204": { description: Soft-deleted }
        default: { $ref: "#/components/responses/Problem" }
  /conversations/{id}/messages:
    get:
      tags: [conversations]
      operationId: listMessages
      parameters: [ { $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MessagePage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [conversations]
      operationId: postMessage
      description: "Append a user message and run the conversation's agent. SSE when Accept: text/event-stream."
      parameters: [ { $ref: "#/components/parameters/Id" }, { $ref: "#/components/parameters/CorrelationId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MessageCreateIn" } } } }
      responses:
        "200":
          description: Assistant reply (JSON) or SSE stream
          content:
            application/json: { schema: { $ref: "#/components/schemas/MessageOut" } }
            text/event-stream: { schema: { type: string } }
        default: { $ref: "#/components/responses/Problem" }

  /files:
    get:
      tags: [files]
      operationId: listFiles
      parameters: [ { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FilePage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [files]
      operationId: registerFile
      description: Register an upload; returns a presigned PUT URL (MinIO).
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FileRegisterIn" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FileRegisterOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /files/{id}/complete:
    post:
      tags: [files]
      operationId: completeFile
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody: { required: false, content: { application/json: { schema: { $ref: "#/components/schemas/FileCompleteIn" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FileOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /files/{id}:
    get:
      tags: [files]
      operationId: getFile
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FileOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      tags: [files]
      operationId: deleteFile
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "204": { description: Soft-deleted }
        default: { $ref: "#/components/responses/Problem" }

  /knowledge/search:
    post:
      tags: [knowledge]
      operationId: searchKnowledge
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/KnowledgeSearchIn" } } } }
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/RetrievedChunkPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /knowledge/documents:
    get:
      tags: [knowledge]
      operationId: listDocuments
      parameters: [ { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DocumentPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /knowledge/documents/{id}:
    get:
      tags: [knowledge]
      operationId: getDocument
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DocumentOut" } } } }
        default: { $ref: "#/components/responses/Problem" }

  /media/jobs:
    post:
      tags: [media]
      operationId: createMediaJob
      description: Enqueue a heavy generation job (async via Redis Streams). Returns queued job.
      parameters: [ { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/MediaJobCreateIn" } } } }
      responses:
        "202": { description: Accepted, content: { application/json: { schema: { $ref: "#/components/schemas/MediaJobOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /media/jobs/{id}:
    get:
      tags: [media]
      operationId: getMediaJob
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MediaJobOut" } } } }
        default: { $ref: "#/components/responses/Problem" }

  /workflows:
    get:
      tags: [workflows]
      operationId: listWorkflows
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /workflows/{key}/run:
    post:
      tags: [workflows]
      operationId: runWorkflow
      parameters: [ { name: key, in: path, required: true, schema: { type: string } }, { $ref: "#/components/parameters/CorrelationId" }, { $ref: "#/components/parameters/IdempotencyKey" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowRunIn" } } } }
      responses:
        "200":
          description: Result (JSON) or SSE stream
          content:
            application/json: { schema: { $ref: "#/components/schemas/WorkflowRunOut" } }
            text/event-stream: { schema: { type: string } }
        "202": { description: Accepted (heavy async), content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowRunOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /workflows/runs/{id}:
    get:
      tags: [workflows]
      operationId: getWorkflowRun
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowRunOut" } } } }
        default: { $ref: "#/components/responses/Problem" }

  /credentials:
    get:
      tags: [credentials]
      operationId: listCredentials
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/CredentialPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [credentials]
      operationId: createCredential
      description: Secret is encrypted server-side via Vault Transit and never returned.
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CredentialCreateIn" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/CredentialOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /credentials/{id}:
    delete:
      tags: [credentials]
      operationId: revokeCredential
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "204": { description: Revoked }
        default: { $ref: "#/components/responses/Problem" }

  /integrations/connectors:
    get:
      tags: [integrations]
      operationId: listConnectors
      description: Catalog of available third-party connectors for this workspace.
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/ConnectorPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/connections:
    get:
      tags: [integrations]
      operationId: listConnections
      parameters: [ { $ref: "#/components/parameters/Limit" }, { $ref: "#/components/parameters/Cursor" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ConnectionPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [integrations]
      operationId: createConnection
      description: Begin connecting a connector; secrets are stored encrypted via Vault Transit and never returned.
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ConnectionCreateIn" } } } }
      responses:
        "201": { description: Created (pending), content: { application/json: { schema: { $ref: "#/components/schemas/ConnectionOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/connections/{id}/authorize:
    post:
      tags: [integrations]
      operationId: authorizeConnection
      description: Returns the third-party OAuth authorize URL to redirect the user to.
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AuthorizeOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/connections/oauth/callback:
    get:
      tags: [integrations]
      operationId: oauthCallback
      description: OAuth redirect target; exchanges code for tokens (stored encrypted) and marks the connection connected.
      parameters:
        - { name: code, in: query, required: true, schema: { type: string } }
        - { name: state, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Connected, content: { application/json: { schema: { $ref: "#/components/schemas/ConnectionOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/connections/{id}:
    delete:
      tags: [integrations]
      operationId: revokeConnection
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "204": { description: Revoked }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/mcp-servers:
    get:
      tags: [integrations]
      operationId: listMcpServers
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/McpServerPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      tags: [integrations]
      operationId: registerMcpServer
      description: "Register a remote MCP server (HTTP/SSE only in v1; local stdio is out of scope)."
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/McpServerCreateIn" } } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/McpServerOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/mcp-servers/{id}:
    delete:
      tags: [integrations]
      operationId: deleteMcpServer
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Problem" }
  /integrations/tools:
    get:
      tags: [integrations]
      operationId: listDiscoveredTools
      description: Dynamic per-workspace tool catalog (connector tools + runtime-discovered MCP tools).
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/DiscoveredToolPage" } } } }
        default: { $ref: "#/components/responses/Problem" }

  /usage:
    get:
      tags: [usage]
      operationId: getUsage
      description: "Usage summary for the workspace. Enforcement/capture are internal inbound ports (not public API)."
      parameters:
        - { name: period, in: query, required: false, schema: { type: string, enum: [day, month], default: month } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/UsageSummaryOut" } } } }
        default: { $ref: "#/components/responses/Problem" }
  /usage/limits:
    get:
      tags: [usage]
      operationId: getUsageLimits
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/UsageLimitPage" } } } }
        default: { $ref: "#/components/responses/Problem" }
    put:
      tags: [usage]
      operationId: putUsageLimits
      description: Replace configurable quotas/budgets/limits (owner/admin).
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UsageLimitsPutIn" } } } }
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/UsageLimitPage" } } } }
        default: { $ref: "#/components/responses/Problem" }

  # Health probes live outside the /api/v1 base and require no auth (03 §0, §1).
  # The per-path `servers: [{ url: / }]` override anchors them at the server root
  # instead of resolving under the global `servers: /api/v1`.
  # NOTE: The interactive WebSocket endpoint /api/v1/ws is intentionally NOT modeled
  # here — WebSocket is out of scope for OpenAPI 3.1; its protocol is specified in 03 §3.2.
  /health:
    servers: [ { url: / } ]
    get:
      tags: [health]
      operationId: getHealth
      description: Liveness probe. No authentication.
      security: []
      responses:
        "200": { description: OK, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/HealthOut" } } } }
  /health/ready:
    servers: [ { url: / } ]
    get:
      tags: [health]
      operationId: getHealthReady
      description: Readiness probe (dependencies checked). No authentication.
      security: []
      responses:
        "200": { description: Ready, headers: { X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" } }, content: { application/json: { schema: { $ref: "#/components/schemas/HealthOut" } } } }
        "503": { description: Not ready, content: { application/json: { schema: { $ref: "#/components/schemas/HealthOut" } } } }

components:
  securitySchemes:
    firebaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    AgentKey: { name: agent_key, in: path, required: true, schema: { type: string } }
    Limit: { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    Cursor: { name: cursor, in: query, required: false, schema: { type: string } }
    CorrelationId: { name: X-Correlation-Id, in: header, required: false, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
  headers:
    CorrelationId:
      description: "Request correlation id, echoed on every response (generated if absent). See 03 §0."
      schema: { type: string }
  responses:
    Problem:
      description: RFC 9457 Problem Details
      headers:
        X-Correlation-Id: { $ref: "#/components/headers/CorrelationId" }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Problem:
      type: object
      required: [type, title, status, code, correlation_id]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string, description: "stable machine code, e.g. files.too_large" }
        correlation_id: { type: string }
        errors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field: { type: string }
              message: { type: string }
    PageMeta:
      type: object
      properties: { next_cursor: { type: string, nullable: true, description: "opaque cursor; null on the last (or unbounded) page" }, limit: { type: integer } }
    HealthOut:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, degraded, unavailable] }
        checks: { type: object, additionalProperties: { type: string } }
    WorkspaceOut:
      type: object
      properties: { id: {type: string, format: uuid}, name: {type: string}, status: {type: string}, created_at: {type: string, format: date-time, description: "UTC ISO-8601, trailing Z (DAT-06)", pattern: "Z$"} }
    WorkspacePatchIn:
      type: object
      required: [name]
      properties: { name: { type: string, minLength: 1, maxLength: 80 } }
    AgentOut:
      type: object
      properties:
        key: {type: string}
        name: {type: string}
        version: {type: string}
        description: {type: string}
        capabilities: { type: array, items: {type: string} }
        required_permissions: { type: array, items: {type: string} }
    AgentInvokeIn:
      type: object
      required: [input]
      properties:
        conversation_id: { type: string, format: uuid, nullable: true }
        input: { type: object, additionalProperties: true }
        stream: { type: boolean, default: false }
    AgentInvokeOut:
      type: object
      properties:
        conversation_id: {type: string, format: uuid}
        message: { $ref: "#/components/schemas/MessageOut" }
        usage: { $ref: "#/components/schemas/Usage" }
    Usage:
      type: object
      properties: { prompt_tokens: {type: integer}, completion_tokens: {type: integer} }
    ConversationOut:
      type: object
      properties:
        id: {type: string, format: uuid}
        agent_key: {type: string}
        kind: {type: string, enum: [agent, workflow]}
        title: {type: string, nullable: true}
        created_at: {type: string, format: date-time, description: "UTC ISO-8601, trailing Z (DAT-06)", pattern: "Z$"}
    ConversationCreateIn:
      type: object
      required: [agent_key]
      properties: { agent_key: {type: string}, title: {type: string, nullable: true} }
    ConversationPage:
      type: object
      properties: { data: { type: array, items: { $ref: "#/components/schemas/ConversationOut" } }, meta: { $ref: "#/components/schemas/PageMeta" } }
    MessageOut:
      type: object
      properties:
        id: {type: string, format: uuid}
        role: {type: string, enum: [user, assistant, system, tool]}
        content: {type: object, additionalProperties: true}
        token_count: {type: integer, nullable: true}
        seq: {type: integer}
        created_at: {type: string, format: date-time, description: "UTC ISO-8601, trailing Z (DAT-06)", pattern: "Z$"}
    MessageCreateIn:
      type: object
      required: [content]
      properties: { content: {type: object, additionalProperties: true}, stream: {type: boolean, default: false} }
    MessagePage:
      type: object
      properties: { data: { type: array, items: { $ref: "#/components/schemas/MessageOut" } }, meta: { $ref: "#/components/schemas/PageMeta" } }
    FileRegisterIn:
      type: object
      required: [name, content_type, size_bytes]
      properties: { name: {type: string, maxLength: 255}, content_type: {type: string}, size_bytes: {type: integer, minimum: 0} }
    FileRegisterOut:
      type: object
      properties: { file_id: {type: string, format: uuid}, upload_url: {type: string}, expires_in: {type: integer} }
    FileCompleteIn:
      type: object
      properties: { checksum: {type: string, nullable: true} }
    FileOut:
      type: object
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        content_type: {type: string}
        size_bytes: {type: integer}
        status: {type: string, enum: [uploaded, scanning, ready, quarantined]}
        download_url: {type: string, nullable: true}
